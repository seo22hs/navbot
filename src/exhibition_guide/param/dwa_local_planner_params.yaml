DWAPlannerROS:
  max_vel_x: 0.22
  min_vel_x: 0.0
  max_vel_y: 0.0
  min_vel_y: 0.0
  max_trans_vel: 0.22
  min_trans_vel: 0.05
  trans_stopped_vel: 0.05

  max_rot_vel: 2.75
  min_rot_vel: 0.4
  rot_stopped_vel: 0.4

  acc_lim_x: 2.5
  acc_lim_y: 0.0
  acc_lim_theta: 3.2

  yaw_goal_tolerance: 0.15
  xy_goal_tolerance: 0.10

  sim_time: 1.5
  vx_samples: 6
  vy_samples: 1
  vtheta_samples: 20

  path_distance_bias: 32.0
  goal_distance_bias: 24.0
  occdist_scale: 0.02
  forward_point_distance: 0.325
  stop_time_buffer: 0.2
  scaling_speed: 0.25
  max_scaling_factor: 0.2
  oscillation_reset_dist: 0.05

  publish_traj_pc: true
  publish_cost_grid_pc: true
  global_frame_id: odom
